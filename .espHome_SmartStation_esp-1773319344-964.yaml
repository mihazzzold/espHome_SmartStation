



esphome:
  name: "esp-1773319344-964"
  friendly_name: "espHome SmartStation #esp-1773319344-964"
  project:
    name: "mihazzz123.espHome-SmartStation"
    version: "${firmware_version}"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

wifi:
  ap:
    ssid: "esp-1773319344-964-setup"
    password: !secret ap_password
  reboot_timeout: 0s

captive_portal:

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Настройка I2S аудио
i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO2

  - id: i2s_in
    i2s_lrclk_pin: GPIO4
    i2s_bclk_pin: GPIO5

# Динамик (ЦАП PCM5102A)
speaker:
  - platform: i2s_audio
    id: speaker_id
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO1
    # PCM5102A не требует MCLK (может генерировать его сам из BCLK)
    # Если на плате C3 SuperMini не хватает пинов, можно объединить тактирование LRCLK/BCLK для выхода и входа

# Микрофон (INMP441)
microphone:
  - platform: i2s_audio
    id: microphone_id
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO6
    pdm: false
    # INMP441 работает в обычном режиме I2S

# Голосовой ассистент
voice_assistant:
  id: va
  microphone: microphone_id
  speaker: speaker_id
  # Использование Home Assistant для распознавания (STT/TTS/Wake Word)
  # Необходима конфигурация в Home Assistant (Assist)
  noise_suppression_level: 2
  auto_gain: 31dB
  volume_multiplier: 1.5

# Опционально: кнопка для активации (Push-to-talk)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9 # Кнопка BOOT на SuperMini (иногда требует внешнюю подтяжку)
      inverted: true
      mode: INPUT_PULLUP
    name: "Кнопка активации"
    on_click:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
          else:
            - voice_assistant.start:

# Датчик громкости для ассистента
number:
  - platform: template
    name: "Громкость ассистента"
    id: assistant_volume
    min_value: 0
    max_value: 1
    step: 0.1
    initial_value: 0.8
    restore_value: true
    set_action:
      - voice_assistant.set_volume_multiplier: !lambda "return x;"

# Дополнительно: Индикатор состояния (светодиод на плате)
light:
  - platform: status_led
    id: status_led_light
    name: "Статус LED"
    pin:
      number: GPIO8 # Светодиод на C3 SuperMini
      inverted: true